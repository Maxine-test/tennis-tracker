<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>網球課程紀錄</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #C0D725;
    --primary-glow: rgba(192,215,37,0.35);
    --bg: #0F172A;
    --card: rgba(30,41,59,0.85);
    --border: rgba(255,255,255,0.1);
    --muted: #94A3B8;
    --danger: #EF4444;
    --text: #F8FAFC;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.blobs { position: fixed; inset: 0; z-index: -1; filter: blur(90px); pointer-events: none; }
.blob { position: absolute; border-radius: 50%; opacity: 0.12; }
.blob-1 { width: 280px; height: 280px; background: var(--primary); top: -60px; right: -60px; }
.blob-2 { width: 220px; height: 220px; background: #FF5C00; bottom: 80px; left: -60px; }

.wrap { max-width: 460px; margin: 0 auto; padding: 18px 16px 50px; }

/* HEADER */
header { margin-bottom: 20px; }
.header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.badge { font-size: 10px; font-weight: 700; color: var(--primary); background: rgba(192,215,37,0.1); border: 1px solid var(--primary); border-radius: 10px; padding: 3px 9px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.icon-btn:active { opacity: 0.7; }
.court-btn { max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
h1 { font-size: 26px; font-weight: 800; }
.today-date { font-size: 13px; color: var(--primary); font-weight: 600; margin-top: 3px; }

/* GLASS CARD */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 14px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }

/* PHASE SELECTOR */
.phase-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.phase-row label { font-size: 11px; color: var(--muted); white-space: nowrap; }
#phase-selector { flex: 1; background: rgba(0,0,0,0.35); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 12px; font-size: 13px; font-family: inherit; font-weight: 700; }
.term-date-row { font-size: 12px; color: var(--muted); margin-bottom: 14px; cursor: pointer; }
.term-date-row u { color: var(--text); }
.ended-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 700; margin-bottom: 12px; }

/* STATS */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.stat { background: rgba(255,255,255,0.03); border-radius: 14px; padding: 11px 13px; }
.stat.span2 { grid-column: span 2; border: 1px solid rgba(192,215,37,0.2); background: rgba(192,215,37,0.05); }
.stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
.stat-val { font-size: 19px; font-weight: 700; }
.stat.span2 .stat-val { font-size: 22px; color: var(--primary); }

/* PROGRESS */
.prog-bg { height: 7px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--primary); transition: width 0.6s; }
.prog-text { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 10px; }
.pay-alert { color: var(--danger); font-weight: 800; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* SETTLE BUTTON */
.settle-btn { width: 100%; margin-top: 14px; padding: 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--muted); border-radius: 14px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.settle-btn:hover:not(:disabled) { background: rgba(192,215,37,0.08); border-color: var(--primary); color: var(--primary); }
.settle-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* HISTORY */
.hist-header { display: flex; align-items: center; justify-content: space-between; margin: 16px 0 10px; border-top: 1px solid var(--border); padding-top: 14px; }
.hist-header h3 { font-size: 14px; font-weight: 700; }
.hist-count { font-size: 11px; color: var(--muted); }
.hist-list { display: flex; flex-direction: column; gap: 8px; }
.hist-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.hist-info { flex: 1; min-width: 0; }
.hist-date-row { display: flex; align-items: center; gap: 8px; }
.hist-date { font-size: 14px; font-weight: 700; }
.hist-meta { font-size: 11px; color: var(--muted); }
.hist-note { font-size: 11px; color: var(--primary); opacity: 0.85; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.del-btn { background: rgba(239,68,68,0.1); color: var(--danger); border: none; width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 15px; cursor: pointer; flex-shrink: 0; }
.empty-msg { text-align: center; color: var(--muted); padding: 30px 0; font-style: italic; font-size: 13px; }
.pager { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 16px; }
.page-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 9px 16px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; }
.page-btn:disabled { opacity: 0.15; }

/* FORM CARD */
.form-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
.field { margin-bottom: 12px; }
.field-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; display: block; }
.input-wrap { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; }
.input-wrap input { background: transparent; border: none; color: var(--text); font-family: inherit; font-size: 14px; width: 100%; }
.input-wrap input:focus { outline: none; }
.autofill-icon { font-size: 13px; opacity: 0.5; }
.dur-row { display: flex; gap: 8px; margin: 12px 0; }
.dur-row input[type=radio] { display: none; }
.dur-row label { flex: 1; text-align: center; padding: 13px; border: 1px solid var(--border); border-radius: 13px; font-weight: 700; font-size: 14px; background: rgba(255,255,255,0.04); cursor: pointer; }
.dur-row input:checked + label { background: var(--primary); color: #111; border-color: var(--primary); box-shadow: 0 0 14px var(--primary-glow); }
.confirm-btn { width: 100%; padding: 15px; background: var(--primary); color: #111; border: none; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; font-family: inherit; box-shadow: 0 5px 18px var(--primary-glow); }
.confirm-btn:active { transform: scale(0.98); }
.cancel-link { width: 100%; background: none; border: none; color: var(--muted); font-size: 12px; margin-top: 12px; cursor: pointer; text-decoration: underline; font-family: inherit; }

/* MODAL */
.hidden { display: none !important; }
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
.modal.hidden { display: none; }
.modal-box { width: 100%; max-width: 360px; background: #0F172A; border: 1px solid var(--primary); border-radius: 22px; padding: 24px; box-shadow: 0 0 40px rgba(192,215,37,0.15); }
.modal-box h3 { font-size: 18px; color: var(--primary); margin-bottom: 10px; }
.modal-box p { font-size: 13px; color: var(--muted); margin-bottom: 18px; white-space: pre-wrap; line-height: 1.7; }
.modal-input { width: 100%; padding: 13px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 11px; color: var(--text); font-family: inherit; font-size: 14px; margin-bottom: 18px; }
.modal-textarea { width: 100%; height: 155px; padding: 13px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 11px; color: var(--text); font-family: monospace; font-size: 12px; resize: none; margin-bottom: 18px; }
.modal-hint { font-size: 11px; color: var(--muted); margin-bottom: 8px; text-align: left; }
.modal-btns { display: flex; gap: 10px; }
.mbtn { flex: 1; padding: 15px; border-radius: 13px; font-weight: 800; font-size: 14px; border: none; cursor: pointer; font-family: inherit; }
.mbtn-ok { background: var(--primary); color: #111; }
.mbtn-cancel { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); }
</style>
</head>
<body>
<div class="blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

<div class="wrap">
  <!-- HEADER -->
  <header>
    <div class="header-row">
      <span class="badge">🎾 網球課程紀錄</span>
      <div class="header-actions">
        <button class="icon-btn" id="btn-import">📅 匯入備註</button>
        <button class="icon-btn court-btn" id="btn-court">🏟️ 場地</button>
      </div>
    </div>
    <h1>網球課程紀錄</h1>
    <p class="today-date" id="today-label">載入中...</p>
  </header>

  <!-- MAIN PHASE + HISTORY CARD -->
  <div class="card" id="phase-card">
    <!-- Phase Selector -->
    <div class="phase-row">
      <label>課程期數：</label>
      <select id="phase-selector"><option value="">載入中...</option></select>
      <button class="icon-btn" id="btn-add-phase" title="新增過去期數">＋ 新增期數</button>
    </div>

    <!-- Term start date (editable only for current phase) -->
    <p class="term-date-row" id="term-date-row"></p>

    <!-- Historical badge -->
    <div class="ended-badge hidden" id="ended-badge">🔒 當期課程已結束</div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat"><div class="stat-label">期間時數</div><div class="stat-val" id="s-hours">0 h</div></div>
      <div class="stat"><div class="stat-label">期間堂數</div><div class="stat-val" id="s-count">0 次</div></div>
      <div class="stat span2"><div class="stat-label">剩餘時數 / 累計提醒</div><div class="stat-val" id="s-rem">10 h</div></div>
    </div>

    <!-- Progress -->
    <div class="prog-bg"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-text">
      <span id="prog-desc">進度 0 / 10h</span>
      <span id="alert-zone">課程進行中</span>
    </div>

    <!-- Settlement (only current phase) -->
    <button class="settle-btn" id="btn-settle">✅ 結算本期、開始新一期</button>

    <!-- History list -->
    <div class="hist-header">
      <h3>上課紀錄</h3>
      <span class="hist-count" id="hist-count"></span>
    </div>
    <div class="hist-list" id="hist-list"><p class="empty-msg">尚無紀錄</p></div>
    <div class="pager hidden" id="pager">
      <button class="page-btn" id="p-prev">←</button>
      <span id="p-text">1 / 1</span>
      <button class="page-btn" id="p-next">→</button>
    </div>
  </div>

  <!-- NEW RECORD FORM -->
  <div class="card" id="form-card">
    <p class="form-title">新增上課紀錄</p>
    <div class="field">
      <label class="field-label">上課日期</label>
      <div class="input-wrap"><input type="date" id="inp-date"></div>
    </div>
    <div class="field">
      <label class="field-label">場地 / 備註（依日期自動帶入）</label>
      <div class="input-wrap">
        <span class="autofill-icon" id="autofill-icon">🤖</span>
        <input type="text" id="inp-note" placeholder="可手動修改">
      </div>
    </div>
    <div class="dur-row">
      <input type="radio" name="dur" id="h1" value="1">
      <label for="h1">1 小時</label>
      <input type="radio" name="dur" id="h2" value="2" checked>
      <label for="h2">2 小時</label>
    </div>
    <button class="confirm-btn" id="btn-add">確定紀錄</button>
    <button class="cancel-link" id="btn-cancel">今日課程取消</button>
  </div>

  <!-- GLOBAL HISTORY LOG -->
  <div class="card" id="global-card">
    <div class="hist-header" style="align-items: center;">
      <h3>全部上課紀錄 Log</h3>
      <div style="display:flex; gap:8px; align-items:center;">
        <span class="hist-count" id="global-hist-count"></span>
        <button class="icon-btn" id="btn-reset-all" style="color:var(--danger); border-color:rgba(239,68,68,0.3); padding:4px 8px; font-size:10px;">🗑️ 重新記錄 (清空)</button>
      </div>
    </div>
    <div class="hist-list" id="global-hist-list"><p class="empty-msg">尚無紀錄</p></div>
    <div class="pager hidden" id="global-pager">
      <button class="page-btn" id="gp-prev">←</button>
      <span id="gp-text" style="font-size:12px; font-weight:700;">1 / 1</span>
      <button class="page-btn" id="gp-next">→</button>
    </div>
  </div>

  <p style="text-align:center;font-size:10px;color:rgba(148,163,184,0.3);margin-top:20px;">
    Tennis Tracker v5 · localStorage
  </p>
</div>

<!-- MODAL -->
<div class="modal hidden" id="modal">
  <div class="modal-box">
    <h3 id="m-title">標題</h3>
    <p id="m-body">內容</p>
    <div id="m-input-wrap" class="hidden">
      <input type="text" id="m-input" class="modal-input" placeholder="請輸入...">
    </div>
    <div id="m-textarea-wrap" class="hidden">
      <p class="modal-hint">請貼上場地預約資訊（支援格式 MM/DD 備註）：</p>
      <textarea id="m-textarea" class="modal-textarea" placeholder="例如:&#10;03/24(二) 20-21第3面&#10;03/24 21-22第4面"></textarea>
    </div>
    <div class="modal-btns">
      <button class="mbtn mbtn-ok" id="m-ok">確定</button>
      <button class="mbtn mbtn-cancel" id="m-cancel">取消</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────
const KEY      = 'tennis_v4_6_data';   // shared with index.html
const OLD_KEY  = 'tennis_v4_5_stable_final_data';
const DB_URL   = 'https://script.google.com/macros/s/AKfycbxG6Gk3whJHW5Ek4DSyW1gZnIM--euOV5ZQp7n7c8rv4Ja6H28Jwh8nC4Vbj-gAHg88IQ/exec';
const MAX_H    = 10;
const PER_PAGE = 10;

// ─── STATE ─────────────────────────────────────────────────
let data = { currentPhaseStart:null, phases:[], history:[], courtDefault:'場地1', remarkSchedule:{} };
let viewPhase = null;   // which phase the user is currently viewing (local, not saved)
let page = 1;
let globalPage = 1;
let pendingCB = null;

// ─── DOM ────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const el = {
  todayLabel:$('today-label'), phaseSelector:$('phase-selector'),
  termDateRow:$('term-date-row'), endedBadge:$('ended-badge'),
  sHours:$('s-hours'), sCount:$('s-count'), sRem:$('s-rem'),
  progFill:$('prog-fill'), progDesc:$('prog-desc'), alertZone:$('alert-zone'),
  btnSettle:$('btn-settle'), histList:$('hist-list'), histCount:$('hist-count'),
  pager:$('pager'), pPrev:$('p-prev'), pNext:$('p-next'), pText:$('p-text'),
  globalHistList:$('global-hist-list'), globalHistCount:$('global-hist-count'),
  globalPager:$('global-pager'), gpPrev:$('gp-prev'), gpNext:$('gp-next'), gpText:$('gp-text'),
  btnResetAll:$('btn-reset-all'),
  formCard:$('form-card'), inpDate:$('inp-date'), inpNote:$('inp-note'),
  autofillIcon:$('autofill-icon'), btnAdd:$('btn-add'), btnCancel:$('btn-cancel'),
  btnImport:$('btn-import'), btnCourt:$('btn-court'), btnAddPhase:$('btn-add-phase'),
  modal:$('modal'), mTitle:$('m-title'), mBody:$('m-body'),
  mInputWrap:$('m-input-wrap'), mInput:$('m-input'),
  mTextareaWrap:$('m-textarea-wrap'), mTextarea:$('m-textarea'),
  mOk:$('m-ok'), mCancel:$('m-cancel')
};

// ─── INIT ────────────────────────────────────────────────────
async function init() {
  document.body.style.opacity = '0.5';
  await load();
  document.body.style.opacity = '1';
  viewPhase = data.currentPhaseStart;
  updateClock();
  setDefaultDate();

  el.phaseSelector.onchange = () => { viewPhase = el.phaseSelector.value; page = 1; render(); };
  el.termDateRow.onclick = () => { if(viewPhase === data.currentPhaseStart) editPhaseStart(); };
  el.btnSettle.onclick = triggerSettle;
  el.btnAdd.onclick = addRecord;
  el.btnCancel.onclick = logCancel;
  el.btnImport.onclick = openImport;
  el.btnCourt.onclick = editCourt;
  el.btnAddPhase.onclick = addPastPhase;
  el.btnResetAll.onclick = resetAllData;
  el.pPrev.onclick = () => { if(page>1){page--;render();} };
  el.pNext.onclick = () => { if(page<totalPages()){page++;render();} };
  el.gpPrev.onclick = () => { if(globalPage>1){globalPage--;renderGlobalHistory();} };
  el.gpNext.onclick = () => { if(globalPage<Math.max(1, Math.ceil(data.history.length/PER_PAGE))){globalPage++;renderGlobalHistory();} };
  el.mOk.onclick = () => { if(pendingCB) pendingCB(); closeModal(); };
  el.mCancel.onclick = closeModal;

  render();
}

// ─── CLOCK ─────────────────────────────────────────────────
function updateClock() {
  el.todayLabel.textContent = new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
}

function setDefaultDate() {
  // Default to most recent Tuesday
  const d = new Date();
  if(d.getDay()!==2){ const m=(d.getDay()<2)?(d.getDay()+5):(d.getDay()-2); d.setDate(d.getDate()-m); }
  el.inpDate.value = isoDate(d);
  autoFill();
}

// ─── STORAGE ───────────────────────────────────────────────
function todayStr() { return isoDate(new Date()); }
function isoDate(d) { return d.toISOString().split('T')[0]; }

function nextTuesdayFrom(dateStr) {
  const d = new Date(dateStr+'T00:00:00');
  const day = d.getDay();
  d.setDate(d.getDate() + (day===2?7:(2-day+7)%7));
  return isoDate(d);
}

async function load() {
  let raw = null;
  try {
    const res = await fetch(DB_URL);
    const cloudRaw = await res.json();
    if(cloudRaw) raw = typeof cloudRaw === 'string' ? cloudRaw : JSON.stringify(cloudRaw);
  } catch(e) {
    console.error('Cloud load failed, using local', e);
  }
  
  if(!raw) {
    raw = localStorage.getItem(KEY) || localStorage.getItem(OLD_KEY);
  }

  if(raw) {
    try {
      const parsed = JSON.parse(raw);
      data = parsed;
      if(!data.phases) data.phases = [];
      if(!data.courtDefault) data.courtDefault = '場地1';
      if(!data.remarkSchedule) data.remarkSchedule = {};
      if(!data.history) data.history = [];
      // Migration: assign currentPhaseStart if missing
      if(!data.currentPhaseStart) {
        if(data.history.length>0) {
          data.currentPhaseStart = [...data.history].sort((a,b)=>a.fullDate.localeCompare(b.fullDate))[0].fullDate;
        } else {
          data.currentPhaseStart = todayStr();
        }
        if(!data.phases.includes(data.currentPhaseStart)) data.phases.push(data.currentPhaseStart);
        data.phases.sort();
      }
      sortHistory(); // Ensure loaded records are sorted
      // Tag untagged records
      retagAll();
    } catch(e){}
  } else {
    data.currentPhaseStart = todayStr();
    data.phases = [data.currentPhaseStart];
  }
  localStorage.setItem(KEY, JSON.stringify(data)); // cache locally
}

function save() { 
  localStorage.setItem(KEY, JSON.stringify(data)); 
  fetch(DB_URL, {
    method: 'POST',
    body: JSON.stringify(data)
  }).catch(e=>console.error("Cloud sync failed", e));
}

function retagAll() {
  const sp = [...new Set(data.phases)].sort();
  if(!sp.length) return;
  data.history.forEach(item => {
    let assigned = sp[0];
    for(const p of sp) { if(p<=item.fullDate) assigned=p; }
    item.phaseStart = assigned;
  });
}

function sortHistory() {
  data.history.sort((a,b) => {
    if(a.fullDate === b.fullDate) return b.createdAt - a.createdAt;
    return b.fullDate.localeCompare(a.fullDate);
  });
}

// ─── PHASE HELPERS ─────────────────────────────────────────
function sortedPhases() { return [...new Set(data.phases)].sort(); }

function phaseRecords(phaseDate) {
  const sp = sortedPhases();
  const idx = sp.indexOf(phaseDate);
  const next = (idx>=0 && idx<sp.length-1) ? sp[idx+1] : null;
  return data.history.filter(i => i.fullDate>=phaseDate && (!next||i.fullDate<next));
}

function phaseStats(phaseDate) {
  const recs = phaseRecords(phaseDate).filter(i=>i.type==='checkin');
  const h = recs.reduce((s,i)=>s+i.hours, 0);
  return { hours:h, count:recs.length };
}

function isCurrentPhase() { return viewPhase === data.currentPhaseStart; }

function totalPages() { return Math.max(1, Math.ceil(phaseRecords(viewPhase).length/PER_PAGE)); }

// ─── FORMAT ────────────────────────────────────────────────
function fmtLong(dateStr) {
  if(!dateStr) return '未設定';
  const [y,m,d] = dateStr.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}
function fmtLabel(dateStr) {
  if(!dateStr) return '';
  const [y,m,d] = dateStr.split('-');
  return `${y}/${m}/${d}`;
}

// ─── MODAL ─────────────────────────────────────────────────
function openModal(title, body, cb, type='none', val='') {
  el.mTitle.textContent = title;
  el.mBody.textContent = body;
  pendingCB = cb;
  el.mInputWrap.classList.add('hidden');
  el.mTextareaWrap.classList.add('hidden');
  el.mInput.type = 'text';
  if(type==='input') { el.mInputWrap.classList.remove('hidden'); el.mInput.value=val; }
  if(type==='date')  { el.mInputWrap.classList.remove('hidden'); el.mInput.type='date'; el.mInput.value=val; }
  if(type==='textarea') { el.mTextareaWrap.classList.remove('hidden'); el.mTextarea.value=val; }
  el.modal.classList.remove('hidden');
}
function closeModal() { el.modal.classList.add('hidden'); }

// ─── PHASE START EDIT ─────────────────────────────────────
function editPhaseStart() {
  openModal('修改本期開始日期',
    '可修改本期起算日（例如因天氣延後）。\n修改後時數、堂數與紀錄均自動更新。',
    () => {
      const val = el.mInput.value.trim();
      if(!val || !/^\d{4}-\d{2}-\d{2}$/.test(val)) return;
      const sp = sortedPhases();
      const prevPhases = sp.filter(p=>p!==data.currentPhaseStart);
      const latestPrev = prevPhases.length ? prevPhases[prevPhases.length-1] : null;
      if(latestPrev && val<=latestPrev) {
        alert(`❌ 本期起始日必須晚於前一期（${fmtLong(latestPrev)}）`);
        return;
      }
      const idx = data.phases.indexOf(data.currentPhaseStart);
      if(idx>=0) data.phases[idx]=val; else data.phases.push(val);
      data.phases = [...new Set(data.phases)].sort();
      data.currentPhaseStart = val;
      viewPhase = val;
      retagAll(); save(); render();
    }, 'date', data.currentPhaseStart);
}

// ─── COURT EDIT ────────────────────────────────────────────
function editCourt() {
  openModal('修改預設場地', '設定常用場地資訊（無預約資料時自動帶入）：', () => {
    const v = el.mInput.value.trim();
    if(v) { data.courtDefault=v; autoFill(); save(); render(); }
  }, 'input', data.courtDefault);
}

// ─── IMPORT ────────────────────────────────────────────────
function openImport() {
  openModal('批次匯入場地備註', '請貼上 LINE 群組的場地預約資訊。\n支援格式：MM/DD 備註 或 MM-DD 備註', () => {
    const text = el.mTextarea.value;
    const lines = text.split('\n');
    const sched = {};
    const re = /(\d{1,2})[\-\/](\d{1,2})/;
    lines.forEach(l => {
      const clean = l.trim(); if(!clean) return;
      const m = clean.match(re); if(!m) return;
      const key = `${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
      let rem = clean.replace(re,'').replace(/\([^\)]+\)/,'').trim() || '預約場地';
      if(!sched[key]) sched[key]=[];
      sched[key].push(rem);
    });
    const cnt = Object.keys(sched).length;
    if(cnt>0) { data.remarkSchedule=sched; save(); autoFill(); alert(`成功匯入 ${cnt} 個日期的備註！`); }
    else alert('找不到有效的日期資訊（需包含 MM/DD 或 MM-DD）。');
  }, 'textarea');
}

// ─── AUTO FILL ─────────────────────────────────────────────
function autoFill() {
  const dateStr = el.inpDate.value; if(!dateStr) return;
  const [,mm,dd] = dateStr.split('-');
  const key = `${mm}-${dd}`;
  if(data.remarkSchedule[key]) {
    el.inpNote.value = data.remarkSchedule[key].join(' / ');
    el.autofillIcon.textContent = '✅';
  } else {
    el.inpNote.value = data.courtDefault;
    el.autofillIcon.textContent = '🤖';
  }
}
// Update court button label
function updateCourtBtn() {
  el.btnCourt.textContent = `🏟️ ${data.courtDefault.length>8?data.courtDefault.slice(0,8)+'…':data.courtDefault}`;
}

// ─── RECORD ADD ────────────────────────────────────────────
function addRecord() {
  const hEl = document.querySelector('input[name="dur"]:checked');
  if(!hEl) return;
  const h = parseInt(hEl.value);
  const dateStr = el.inpDate.value;
  if(!dateStr) return alert('請選擇日期');
  if(data.history.find(i=>i.fullDate===dateStr)) return alert(`❗ ${dateStr} 已有紀錄，不可重複。`);
  data.history.unshift({
    id: Date.now().toString(), fullDate:dateStr,
    dateLabel: dateStr.split('-').slice(1).join('/'),
    type:'checkin', hours:h, note:el.inpNote.value.trim(),
    phaseStart:data.currentPhaseStart, createdAt:Date.now()
  });
  sortHistory();
  retagAll(); // auto-assign to correct phase by fullDate
  page=1; globalPage=1; save();
  // Switch view to current phase so user sees their new record
  if(viewPhase!==data.currentPhaseStart){ viewPhase=data.currentPhaseStart; }
  render();
  alert('已成功加入紀錄！');
}

function logCancel() {
  const dateStr = el.inpDate.value || todayStr();
  if(data.history.find(i=>i.fullDate===dateStr)) return alert(`❗ ${dateStr} 已有紀錄，不可重複。`);
  data.history.unshift({
    id:Date.now().toString(), fullDate:dateStr,
    dateLabel:dateStr.split('-').slice(1).join('/'),
    type:'cancel', hours:0, note:el.inpNote.value.trim()||'課程取消',
    phaseStart:data.currentPhaseStart, createdAt:Date.now()
  });
  sortHistory();
  retagAll();
  page=1; globalPage=1; save(); render();
}

// ─── RESET ALL ────────────────────────────────────────────
function resetAllData() {
  openModal('警告：清空全部紀錄', '這將會刪除所有期數與所有的上課紀錄，包含雲端也會清空！\n確定要重新記錄嗎？', async () => {
    localStorage.removeItem(KEY);
    localStorage.removeItem(OLD_KEY);
    document.body.style.opacity = '0.5';
    await fetch(DB_URL, { method: 'POST', body: JSON.stringify(null) }).catch(e=>console.error(e));
    location.reload();
  });
}

// ─── ADD PAST PHASE ───────────────────────────────────────
function addPastPhase() {
  openModal('新增過去期數',
    '請輸入過去期的起始日期：\n\n建立後可切換為該期，在下方填入當期日期補入紀錄。\n系統會自動依日期對正期次。',
    () => {
      const val = el.mInput.value.trim();
      if(!val || !/^\d{4}-\d{2}-\d{2}$/.test(val)) return;
      if(val >= data.currentPhaseStart) {
        alert(`❌ 過去期起始日必須早於本期（${fmtLong(data.currentPhaseStart)}）。`);
        return;
      }
      if(data.phases.includes(val)) {
        alert(`❌ ${fmtLong(val)} 已屬於現有期數。`);
        return;
      }
      data.phases.push(val);
      data.phases = [...new Set(data.phases)].sort();
      retagAll();
      viewPhase = val; // switch view to the new past phase
      page = 1;
      save(); render();
    }, 'date', '');
}

// ─── SETTLE ────────────────────────────────────────────────
function triggerSettle() {
  const st = phaseStats(data.currentPhaseStart);
  const summary = `本期總結：已記錄 ${st.hours}h（${st.count} 堂課）。\n\n確定後，請設定下一期的開始日期。`;
  openModal('結算本期', summary, () => {
    const nxt = nextTuesdayFrom(todayStr());
    setTimeout(()=>{
      openModal('設定下一期開始日期', '通常為下週二，可自行修改：', ()=>{
        const v = el.mInput.value;
        if(!v||!/^\d{4}-\d{2}-\d{2}$/.test(v)) return;
        data.currentPhaseStart = v;
        if(!data.phases.includes(v)){ data.phases.push(v); data.phases.sort(); }
        viewPhase = v;
        page = 1; save(); render();
      },'date',nxt);
    },150);
  });
}

// ─── DELETE ────────────────────────────────────────────────
window.askDelete = id => {
  openModal('刪除紀錄','確定要刪除這筆紀錄嗎？', ()=>{
    data.history = data.history.filter(i=>i.id!==id);
    save(); render();
  });
};

// ─── RENDER ────────────────────────────────────────────────
function render() {
  updateCourtBtn();

  // Build phase selector options
  const sp = sortedPhases();
  const curSel = viewPhase;
  el.phaseSelector.innerHTML = '';
  // Show in reverse order (newest first)
  [...sp].reverse().forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p===data.currentPhaseStart ? `${fmtLabel(p)} 期（進行中）` : `${fmtLabel(p)} 期`;
    el.phaseSelector.appendChild(opt);
  });
  // Ensure viewPhase is valid
  if(!sp.includes(viewPhase)) viewPhase = data.currentPhaseStart;
  el.phaseSelector.value = viewPhase;

  const isCurrent = isCurrentPhase();

  // Term date row
  if(isCurrent) {
    el.termDateRow.innerHTML = `本期開始於：<u>${fmtLong(data.currentPhaseStart)}</u> ✏️`;
    el.termDateRow.style.cursor = 'pointer';
  } else {
    el.termDateRow.textContent = `${fmtLabel(viewPhase)} 期：${fmtLong(viewPhase)} 開始`;
    el.termDateRow.style.cursor = 'default';
  }

  // Historical badge
  el.endedBadge.classList.toggle('hidden', isCurrent);

  // Stats
  const st = phaseStats(viewPhase);
  const remains = Math.max(0, MAX_H - st.hours);
  el.sHours.textContent = `${st.hours} h`;
  el.sCount.textContent = `${st.count} 次`;
  if(st.hours >= MAX_H) {
    el.sRem.textContent = `超過 ${st.hours-MAX_H}h`;
  } else {
    el.sRem.textContent = isCurrent ? `${remains} h` : `最終 ${st.hours}h`;
  }

  const pct = Math.min((st.hours/MAX_H)*100, 100);
  el.progFill.style.width = pct+'%';
  el.progDesc.textContent = `進度 ${st.hours} / 10h`;
  if(st.hours >= MAX_H) {
    el.alertZone.innerHTML = `<span class="pay-alert">該繳費囉! NT$4000（已達${st.hours}h）</span>`;
    el.progFill.style.background = 'var(--danger)';
  } else {
    el.alertZone.textContent = isCurrent ? '課程進行中' : '本期結算完成';
    el.progFill.style.background = '';
  }

  // Settlement button
  el.btnSettle.disabled = !isCurrent;
  
  // History list
  const recs = phaseRecords(viewPhase);
  el.histCount.textContent = `${recs.length} 筆`;
  const tp = Math.max(1, Math.ceil(recs.length/PER_PAGE));
  if(page>tp) page=tp;
  const pageData = recs.slice((page-1)*PER_PAGE, page*PER_PAGE);

  el.pager.classList.toggle('hidden', tp<=1);
  el.pText.textContent = `${page} / ${tp}`;
  el.pPrev.disabled = page===1;
  el.pNext.disabled = page===tp;

  if(!recs.length) {
    el.histList.innerHTML = '<p class="empty-msg">本期尚無紀錄</p>';
  } else {
    el.histList.innerHTML = pageData.map(i=>`
      <div class="hist-item">
        <div class="hist-info">
          <div class="hist-date-row">
            <span class="hist-date">${i.dateLabel} ${i.type==='checkin'?'✅':'❌'}</span>
            <span class="hist-meta">${i.type==='checkin'?i.hours+'h':'取消'}</span>
          </div>
          ${i.note?`<div class="hist-note">📝 ${i.note}</div>`:''}
        </div>
        <button class="del-btn" onclick="askDelete('${i.id}')">🗑️</button>
      </div>
    `).join('');
  }

  renderGlobalHistory();
}

function renderGlobalHistory() {
  const allRecs = data.history;
  el.globalHistCount.textContent = `共 ${allRecs.length} 筆`;
  const tp = Math.max(1, Math.ceil(allRecs.length / PER_PAGE));
  if(globalPage > tp) globalPage = tp;
  const pageData = allRecs.slice((globalPage - 1) * PER_PAGE, globalPage * PER_PAGE);

  el.globalPager.classList.toggle('hidden', tp <= 1);
  el.gpText.textContent = `${globalPage} / ${tp}`;
  el.gpPrev.disabled = globalPage === 1;
  el.gpNext.disabled = globalPage === tp;

  if(!allRecs.length) {
    el.globalHistList.innerHTML = '<p class="empty-msg">全系統尚無紀錄</p>';
  } else {
    el.globalHistList.innerHTML = pageData.map(i => `
      <div class="hist-item">
        <div class="hist-info">
          <div class="hist-date-row">
            <span class="hist-date" style="color:var(--text); font-size:13px;">${i.fullDate} ${i.type==='checkin'?'✅':'❌'}</span>
            <span class="hist-meta" style="color:var(--primary);">${i.type==='checkin'?i.hours+'h':'取消'}</span>
          </div>
          ${i.note ? `<div class="hist-note" style="color:var(--muted);">📝 ${i.note}</div>` : ''}
          <div class="hist-meta" style="margin-top:4px; opacity:0.6;">期數起算：${fmtLabel(i.phaseStart)}</div>
        </div>
      </div>
    `).join('');
  }
}

// Input events
document.getElementById('inp-date').addEventListener('change', autoFill);

init();
</script>
